[tool.mypy]
strict = true
python_version = "3.10"
files = ["src"]
plugins = []
ignore_missing_imports = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["matplotlib.*", "scipy.*", "pandas.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"notebooks/*" = ["E402", "F401"]
"tests/*" = ["B008"]
